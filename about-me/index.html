<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            /* Path to your image file or an external URL */
            background-image: url('bg.jpg'); 
            
            /* Stops the image from tiling over the screen */
            /* background-repeat: no-repeat; 
            
            /* Automatically scales the image to cover the whole screen */
            /* background-size: cover;  
            
            /* Keeps the image fixed in place while scrolling */
            /* background-attachment: fixed;

            /* Keeps the background image centered on the page */
            background-position: center;
        }
    </style>
    <title>Webpage</title>
</head>
<body>
    <h1 style="color:blue">header</h1>
    <p>body</p>
    <img src="bg.jpg" alt="image">
    <button>hello</button>
    <a href="google.com">this is a link</a>
    <a href="google.com"><img source="bg.jpg"></a>
    <ul>
        <li>this is a unordered list</li>
        <li>more stuff</li>
    </ul>
    <ol>
        <li>this is a ordered list</li>
        <li>more stuff</li>
    </ol>
    <b>bold</b>
    <i>italics</i>
    <sub>subscript</sub>
    <sup>superscript</sup>
    <!-- horizontal line -->
    <hr>
    <!-- line break -->
    <br>
</body>
</html>
